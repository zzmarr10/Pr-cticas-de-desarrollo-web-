<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulario basico</title>
</head>

<body>

    <h1>FORMULARIO</h1>
    <form>
        <label for="FORMULARIO">Nombre:</label>
        <input type="text" , id="nombre" , name="nombre" />
        <br>
        <br>
        <label for="Correo electronico">Email:</label>
        <input type="text" , id="Correo electronico" , name="correo electronico" />

        <br><br>
        <button type="submit">Enviar</button>
        <br><br>

        <label for="genero">Genero:</label>
        <br><br>
        <label for="genero">Masculino:</label>
        <input type="radio" , id="genero" , name="genero" value="masculino" />
        <br><br>
        <label for="genero">Femenino:</label>
        <input type="radio" , id="genero" , name="genero" value="femenino" />
        <br><br>

        <label for="pais">Pais:</label>
        <input type="text" , id="pais" , name="pais" />
        <br><br>
        <label for="telefono">Telefono:</label>
        <input type="text" , id="telefono" , name="telefono" />

        <br><br>
        <label for="fecha de nacimiento">fecha de nacimiento</label>
        <input type="date" , id="fecha de nacimiento" , name="fecha de nacimiento" />
        <br><br>

        <label for="color">color favorito</label>
        <input type="color" , id="color" , name="color" , value="blue" />

        <br><br>
        <label for="limpiar">limpiar</label>
        <input type="reset" , id="reset" , name="reset" />
        <br><br>




    </form>



















</body>

</html>
